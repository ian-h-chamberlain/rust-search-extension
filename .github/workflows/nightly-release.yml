name: Nightly Release

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering
  pull_request:
    branches:
      - main
      - master

jobs:
  check:
    name: Check for new commits
    runs-on: ubuntu-latest
    # Always run for PRs and manual triggers, only check hash for scheduled runs
    if: github.event_name != 'schedule' || true
    outputs:
      should_build: ${{ steps.check_hash.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if commit hash changed since last nightly
        id: check_hash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Non-scheduled run, always building."
            exit 0
          fi

          CURRENT_SHA=$(git rev-parse HEAD)
          echo "Current HEAD: $CURRENT_SHA"

          # Get the commit SHA that the 'nightly' tag points to (if it exists)
          LAST_NIGHTLY_SHA=$(gh release view nightly --json targetCommitish --jq '.targetCommitish' 2>/dev/null || echo "")

          if [[ -z "$LAST_NIGHTLY_SHA" ]]; then
            echo "No existing nightly release found, building."
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [[ "$CURRENT_SHA" == "$LAST_NIGHTLY_SHA" ]]; then
            echo "Commit hash unchanged ($CURRENT_SHA), skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New commits since last nightly ($LAST_NIGHTLY_SHA -> $CURRENT_SHA), building."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Nightly Release
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_build == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jsonnet
        run: |
          wget https://github.com/google/go-jsonnet/releases/download/v0.20.0/go-jsonnet_0.20.0_Linux_x86_64.tar.gz
          tar -xzf go-jsonnet_0.20.0_Linux_x86_64.tar.gz
          sudo mv jsonnet /usr/local/bin/
          sudo chmod +x /usr/local/bin/jsonnet
          jsonnet --version

      - name: Install Node.js dependencies
        run: |
          npm install -g esbuild web-ext

      - name: Patch version with nightly build info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')
          # Extract base version from manifest.jsonnet (first version line without conflict markers)
          BASE_VERSION=$(grep -m1 "^local version = " manifest.jsonnet | sed "s/local version = '//;s/';//")
          # Use numeric-only version: base.YYYYMMDD (valid for both Chrome and Firefox)
          NIGHTLY_VERSION="${BASE_VERSION}.${DATE}"
          echo "nightly_version=$NIGHTLY_VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Patching version to: $NIGHTLY_VERSION (commit: $SHORT_SHA)"
          # Replace all version strings in manifest.jsonnet
          sed -i "s/local version = '[^']*'/local version = '${NIGHTLY_VERSION}'/" manifest.jsonnet

      - name: Build Chrome package
        run: make pack chrome

      - name: Build Firefox package
        run: make pack firefox

      - name: Build Edge package
        run: make pack edge

      - name: Upload build artifacts (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: web-ext-artifacts/*.zip
          retention-days: 7

      - name: Get current date
        if: github.event_name != 'pull_request'
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Get short commit SHA
        if: github.event_name != 'pull_request'
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Prepare release assets
        if: github.event_name != 'pull_request'
        id: find_packages
        run: |
          # Find the built packages
          CHROME=$(ls web-ext-artifacts/chrome-rust-search-extension-*.zip)
          FIREFOX=$(ls web-ext-artifacts/firefox-rust-search-extension-*.zip)
          EDGE=$(ls web-ext-artifacts/edge-rust-search-extension-*.zip)

          # Copy with stable names for the rolling nightly release
          cp "$CHROME" web-ext-artifacts/chrome-rust-search-extension-nightly.zip
          cp "$FIREFOX" web-ext-artifacts/firefox-rust-search-extension-nightly.zip
          cp "$EDGE" web-ext-artifacts/edge-rust-search-extension-nightly.zip

          # Original names (include nightly version with date+sha) for the dated release
          echo "chrome_package=$CHROME" >> $GITHUB_OUTPUT
          echo "firefox_package=$FIREFOX" >> $GITHUB_OUTPUT
          echo "edge_package=$EDGE" >> $GITHUB_OUTPUT

      - name: Create/update rolling nightly release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Release (latest)
          body: |
            Automated nightly build from commit ${{ github.sha }} (${{ steps.date.outputs.date }})
            Version: ${{ steps.version.outputs.nightly_version }} (commit: ${{ steps.version.outputs.short_sha }})

            ## Installation

            ### Chrome/Edge
            1. Download the Chrome or Edge package
            2. Extract the zip file
            3. Open chrome://extensions/ (or edge://extensions/)
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the extracted folder

            ### Firefox
            1. Download the Firefox package
            2. Open about:debugging#/runtime/this-firefox
            3. Click "Load Temporary Add-on"
            4. Select the downloaded .zip file

            **Note:** This is a nightly build and may contain experimental features or bugs.
          draft: false
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            web-ext-artifacts/chrome-rust-search-extension-nightly.zip
            web-ext-artifacts/firefox-rust-search-extension-nightly.zip
            web-ext-artifacts/edge-rust-search-extension-nightly.zip

      - name: Create dated nightly release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.date.outputs.date }}-${{ steps.sha.outputs.sha }}
          name: Nightly Release ${{ steps.date.outputs.date }}
          body: |
            Automated nightly build from commit ${{ github.sha }}
            Version: ${{ steps.version.outputs.nightly_version }} (commit: ${{ steps.version.outputs.short_sha }})

            ## Installation

            ### Chrome/Edge
            1. Download the Chrome or Edge package
            2. Extract the zip file
            3. Open chrome://extensions/ (or edge://extensions/)
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the extracted folder

            ### Firefox
            1. Download the Firefox package
            2. Open about:debugging#/runtime/this-firefox
            3. Click "Load Temporary Add-on"
            4. Select the downloaded .zip file

            **Note:** This is a nightly build and may contain experimental features or bugs.
          draft: false
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.find_packages.outputs.chrome_package }}
            ${{ steps.find_packages.outputs.firefox_package }}
            ${{ steps.find_packages.outputs.edge_package }}
